# Yaqin Market host nginx config
# Frontend: yaqin-market.uz
# API: api.yaqin-market.uz
# Docker compose ichida:
# - client 127.0.0.1:5173 ga bind qilinadi
# - server 127.0.0.1:5000 ga bind qilinadi
# Certbot SSL bloklarini keyin o'zi qo'shishi mumkin.

upstream yaqin_market_frontend {
  server 127.0.0.1:5173;
  keepalive 32;
}

upstream yaqin_market_api {
  server 127.0.0.1:5000;
  keepalive 32;
}

map $http_upgrade $yaqin_market_connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  listen [::]:80;
  server_name www.yaqin-market.uz;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
    try_files $uri =404;
    access_log off;
  }

  location / {
    return 301 http://yaqin-market.uz$request_uri;
  }
}

server {
  listen 80;
  listen [::]:80;
  server_name yaqin-market.uz;

  server_tokens off;
  charset utf-8;
  client_max_body_size 20m;
  keepalive_timeout 65;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    image/svg+xml
    font/woff2;

  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
    try_files $uri =404;
    access_log off;
  }

  location ~* \.(?:css|js|mjs|ico|gif|jpe?g|png|svg|webp|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    proxy_pass http://yaqin_market_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://yaqin_market_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_redirect off;
    proxy_buffering off;
  }
}

server {
  listen 80;
  listen [::]:80;
  server_name api.yaqin-market.uz;

  server_tokens off;
  charset utf-8;
  client_max_body_size 20m;
  keepalive_timeout 65;

  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
    try_files $uri =404;
    access_log off;
  }

  location /socket.io/ {
    proxy_pass http://yaqin_market_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $yaqin_market_connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
  }

  location / {
    proxy_pass http://yaqin_market_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_redirect off;
    proxy_buffering off;
  }
}

# SSL olish uchun:
# certbot --nginx -d yaqin-market.uz -d www.yaqin-market.uz -d api.yaqin-market.uz
#
# Certbot odatda shu faylga 443 bloklarini o'zi qo'shib beradi.
