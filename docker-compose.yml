services:
  postgres:
    image: postgres:16-alpine
    container_name: yaqin-market-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yaqin_market}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-yaqin_market}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - yaqin-market

  redis:
    image: redis:7-alpine
    container_name: yaqin-market-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
    command:
      [
        "sh",
        "-c",
        'redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"',
      ]
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$${REDIS_PASSWORD}" ping']
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data
    networks:
      - yaqin-market

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: yaqin-market-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}
      DB_LOGGING: ${DB_LOGGING:-false}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CLIENT_URL: ${PUBLIC_APP_URL:-http://localhost:5173}
      SERVER_URL: ${PUBLIC_API_URL:-http://localhost:5000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CLICK_RETURN_URL_BASE: ${PUBLIC_APP_URL:-http://localhost:5173}
    volumes:
      - server_uploads:/app/uploads
    ports:
      - "127.0.0.1:${API_PORT:-5000}:5000"
    networks:
      - yaqin-market

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: yaqin-market-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "127.0.0.1:${APP_PORT:-5173}:80"
    networks:
      - yaqin-market

  seed:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: build
    container_name: yaqin-market-seed
    profiles: ["tools"]
    env_file:
      - ./server/.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}
      DB_LOGGING: ${DB_LOGGING:-false}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CLICK_RETURN_URL_BASE: ${PUBLIC_APP_URL:-http://localhost:5173}
    command: ["npm", "run", "seed"]
    networks:
      - yaqin-market

volumes:
  postgres_data:
  redis_data:
  server_uploads:

networks:
  yaqin-market:
    driver: bridge
