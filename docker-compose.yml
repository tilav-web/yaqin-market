services:
  postgres:
    image: postgres:16-alpine
    container_name: yaqin-market-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yaqin_market}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-yaqin_market}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - yaqin-market

  redis:
    image: redis:7-alpine
    container_name: yaqin-market-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
    command:
      [
        "sh",
        "-c",
        "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\"",
      ]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data
    networks:
      - yaqin-market

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: yaqin-market-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}
      DB_LOGGING: ${DB_LOGGING:-false}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CLIENT_URL: ${PUBLIC_APP_URL:-http://localhost:5173}
      SERVER_URL: ${PUBLIC_API_URL:-http://localhost:5000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-yaqin_market}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET:-your_secret_key}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      FIXED_OTP_CODE: ${FIXED_OTP_CODE:-111111}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-https://yaqin-market.uz}
      CLICK_SERVICE_ID: ${CLICK_SERVICE_ID:-}
      CLICK_MERCHANT_ID: ${CLICK_MERCHANT_ID:-}
      CLICK_SECRET_KEY: ${CLICK_SECRET_KEY:-}
      PAYME_MERCHANT_ID: ${PAYME_MERCHANT_ID:-}
      PAYME_SECRET_KEY: ${PAYME_SECRET_KEY:-}
    volumes:
      - server_uploads:/app/uploads
    ports:
      - "127.0.0.1:${API_PORT:-5000}:5000"
    networks:
      - yaqin-market

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-http://localhost:5000}
    container_name: yaqin-market-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "127.0.0.1:${APP_PORT:-5173}:80"
    networks:
      - yaqin-market

  seed:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: build
    container_name: yaqin-market-seed
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}
      DB_LOGGING: ${DB_LOGGING:-false}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-yaqin_market}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET:-your_secret_key}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      FIXED_OTP_CODE: ${FIXED_OTP_CODE:-111111}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-https://yaqin-market.uz}
      CLICK_SERVICE_ID: ${CLICK_SERVICE_ID:-}
      CLICK_MERCHANT_ID: ${CLICK_MERCHANT_ID:-}
      CLICK_SECRET_KEY: ${CLICK_SECRET_KEY:-}
      PAYME_MERCHANT_ID: ${PAYME_MERCHANT_ID:-}
      PAYME_SECRET_KEY: ${PAYME_SECRET_KEY:-}
    command: ["npm", "run", "seed"]
    networks:
      - yaqin-market

volumes:
  postgres_data:
  redis_data:
  server_uploads:

networks:
  yaqin-market:
    driver: bridge
